; PlatformIO Project Configuration File
;
; NXP LPCXpresso845MAX development board (LPC845-based).
; Cortex-M0+ @ 24 MHz, 16 KB SRAM / 64 KB Flash.
;
; FastLED uses the bit-bang clockless driver by default on this env.
; To opt into the SCT+DMA fast path add: -DFASTLED_LPC_PWM_DMA=1
;
; The platform package isn't in the upstream PlatformIO registry; we use
; the zackees/platform-nxplpc-arduino package, which adds the Arduino
; framework binding for the LPC8xx parts via ArduinoCore-LPC8xx.

[env:lpcxpresso845max]
platform = https://github.com/zackees/platform-nxplpc-arduino.git#main
board = lpcxpresso845max
framework = arduino

lib_deps =
    FastLED
